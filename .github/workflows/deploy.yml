name: Deploy Pabandi Platform

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker

      - name: Run Prisma Migrations
        continue-on-error: true
        run: |-
          docker build --target builder -t pabandi-server-builder ./server
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DIRECT_URL="${{ secrets.DIRECT_URL }}" \
            pabandi-server-builder \
            sh -lc "npx prisma migrate deploy"

      - name: Build and Push Production Image
        run: |-
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server ./server
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server

      - name: Create env.yaml
        run: |
          cat <<EOF > env.yaml
          NODE_ENV: production
          API_VERSION: v1
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          DIRECT_URL: "${{ secrets.DIRECT_URL }}"
          FRONTEND_URL: "${{ secrets.FRONTEND_URL }}"
          BACKEND_URL: "https://pabandi-server-97129395003.asia-south1.run.app"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          JWT_REFRESH_SECRET: "${{ secrets.JWT_REFRESH_SECRET }}"
          FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
          FIREBASE_CLIENT_EMAIL: "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          FIREBASE_PRIVATE_KEY: "${{ secrets.FIREBASE_PRIVATE_KEY }}"
          GOOGLE_CLIENT_ID: "${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          GOOGLE_MAPS_API_KEY: "${{ secrets.GOOGLE_MAPS_API_KEY }}"
          LOCATIONIQ_API_KEY: "${{ secrets.LOCATIONIQ_API_KEY }}"
          SMTP_USER: "${{ secrets.SMTP_USER }}"
          SMTP_PASS: "${{ secrets.SMTP_PASS }}"
          LOG_LEVEL: info
          EOF

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy pabandi-server \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file env.yaml

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |-
          cd client
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase
        run: |-
          npx firebase-tools@latest deploy --only hosting --project pabandi-42c5b --force || true
