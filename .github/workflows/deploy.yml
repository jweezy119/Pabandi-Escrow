name: Deploy Pabandi Platform

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker

      - name: Build and Push Container
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server ./server
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server

      - name: Deploy to Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: https://pabandi-server-97129395003.asia-south1.run.app
          API_VERSION: v1
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SAFEPAY_API_KEY: ${{ secrets.SAFEPAY_API_KEY }}
          SAFEPAY_SECRET_KEY: ${{ secrets.SAFEPAY_SECRET_KEY }}
          SAFEPAY_WEBHOOK_SECRET: ${{ secrets.SAFEPAY_WEBHOOK_SECRET }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
        run: |
          required_vars=(DATABASE_URL DIRECT_URL FRONTEND_URL JWT_SECRET JWT_REFRESH_SECRET FIREBASE_PROJECT_ID FIREBASE_CLIENT_EMAIL FIREBASE_PRIVATE_KEY SMTP_USER SMTP_PASS SAFEPAY_API_KEY)
          for v in "${required_vars[@]}"; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done
          optional_vars=(PAYPAL_CLIENT_ID PAYPAL_CLIENT_SECRET PAYPAL_WEBHOOK_ID)
          for v in "${optional_vars[@]}"; do
            if [ -z "${!v}" ]; then
              echo "::warning::Optional secret not set: $v (PayPal features disabled until configured)"
            fi
          done
          cat <<'EOF' > env.yaml
          NODE_ENV: "production"
          API_VERSION: "${API_VERSION}"
          DATABASE_URL: "${DATABASE_URL}"
          DIRECT_URL: "${DIRECT_URL}"
          FRONTEND_URL: "${FRONTEND_URL}"
          BACKEND_URL: "${BACKEND_URL}"
          JWT_SECRET: "${JWT_SECRET}"
          JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
          FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
          FIREBASE_CLIENT_EMAIL: "${FIREBASE_CLIENT_EMAIL}"
          FIREBASE_PRIVATE_KEY: "${FIREBASE_PRIVATE_KEY}"
          GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
          GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
          GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY}"
          SMTP_USER: "${SMTP_USER}"
          SMTP_PASS: "${SMTP_PASS}"
          SAFEPAY_API_KEY: "${SAFEPAY_API_KEY}"
          SAFEPAY_SECRET_KEY: "${SAFEPAY_SECRET_KEY}"
          SAFEPAY_WEBHOOK_SECRET: "${SAFEPAY_WEBHOOK_SECRET}"
          PAYPAL_CLIENT_ID: "${PAYPAL_CLIENT_ID}"
          PAYPAL_CLIENT_SECRET: "${PAYPAL_CLIENT_SECRET}"
          PAYPAL_WEBHOOK_ID: "${PAYPAL_WEBHOOK_ID}"
          FACEBOOK_APP_ID: "${FACEBOOK_APP_ID}"
          FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET}"
          LOG_LEVEL: "info"
          EOF

          gcloud run deploy pabandi-server \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file env.yaml

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |
          cd client
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
