name: Deploy Pabandi Platform

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker

      - name: Run Prisma Migrations
        run: |-
          docker build --target builder -t pabandi-server-builder ./server
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DIRECT_URL="${{ secrets.DIRECT_URL }}" \
            pabandi-server-builder \
            sh -lc "npx prisma migrate deploy"

      - name: Build and Push Production Image
        run: |-
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server ./server
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy pabandi-server \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/pabandi-server \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production \
            --set-env-vars API_VERSION=v1 \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set-env-vars DIRECT_URL="${{ secrets.DIRECT_URL }}" \
            --set-env-vars FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --set-env-vars BACKEND_URL=https://pabandi-server-97129395003.asia-south1.run.app \
            --set-env-vars JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set-env-vars JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            --set-env-vars FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --set-env-vars FIREBASE_CLIENT_EMAIL="${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
            --set-env-vars FIREBASE_PRIVATE_KEY="${{ secrets.FIREBASE_PRIVATE_KEY }}" \
            --set-env-vars GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --set-env-vars GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --set-env-vars GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            --set-env-vars SMTP_USER="${{ secrets.SMTP_USER }}" \
            --set-env-vars SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --set-env-vars SAFEPAY_API_KEY="${{ secrets.SAFEPAY_API_KEY }}" \
            --set-env-vars SAFEPAY_SECRET_KEY="${{ secrets.SAFEPAY_SECRET_KEY }}" \
            --set-env-vars SAFEPAY_WEBHOOK_SECRET="${{ secrets.SAFEPAY_WEBHOOK_SECRET }}" \
            --set-env-vars PAYPAL_CLIENT_ID="${{ secrets.PAYPAL_CLIENT_ID }}" \
            --set-env-vars PAYPAL_CLIENT_SECRET="${{ secrets.PAYPAL_CLIENT_SECRET }}" \
            --set-env-vars PAYPAL_WEBHOOK_ID="${{ secrets.PAYPAL_WEBHOOK_ID }}" \
            --set-env-vars FACEBOOK_APP_ID="${{ secrets.FACEBOOK_APP_ID }}" \
            --set-env-vars FACEBOOK_APP_SECRET="${{ secrets.FACEBOOK_APP_SECRET }}" \
            --set-env-vars LOG_LEVEL=info

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |-
          cd client
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json
        run: |-
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$GOOGLE_APPLICATION_CREDENTIALS"
          
          firebase deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
