[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
skip = ["hardhat.config.ts", "ignition", "test", "scripts", "sdk", "solana"]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
monad_testnet = { chain = 10143, url = "https://testnet.monadexplorer.com/api", key = "YOUR_API_KEY" }
