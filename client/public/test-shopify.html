<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Shopify Product Page</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background: #f1f5f9; }
        .product-card { max-w: 400px; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { margin-top: 0; font-size: 24px; }
        .price { font-size: 20px; color: #1e293b; font-weight: bold; margin-bottom: 20px; }
        .standard-checkout { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
    <!-- Mock the fetch to /cart.js -->
    <script>
        window.originalFetch = window.fetch;
        window.fetch = async function() {
            if (arguments[0] === '/cart.js') {
                return new Response(JSON.stringify({
                    token: "dummy-cart-token",
                    item_count: 1,
                    items: [
                        { title: "Premium Leather Bag", price: 15000, quantity: 1 }
                    ]
                }), { status: 200, headers: { 'Content-Type': 'application/json' } });
            }
            if (arguments[0].includes('/checkout')) {
                // Mock the Pabandi API response for testing
                return new Response(JSON.stringify({ checkoutUrl: "http://localhost:5173/checkout/mock-session-123" }));
            }
            return window.originalFetch.apply(this, arguments);
        };
    </script>
</head>
<body>
    <div class="product-card">
        <h1>Premium Leather Bag</h1>
        <div class="price">$150.00</div>
        
        <button class="standard-checkout">Standard Checkout</button>
        
        <!-- Merchant pastes this snippet -->
        <div id="pabandi-trust-badge" data-shop="dummy-store.myshopify.com"></div>
        <script src="./shopify-widget.js" defer></script>
    </div>
</body>
</html>
